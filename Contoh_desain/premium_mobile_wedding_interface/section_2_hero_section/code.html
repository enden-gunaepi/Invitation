<script>
        // Micro-interaction: Countdown Timer Simulation
        function updateTimer() {
            const now = new Date();
            // Mock countdown values for presentation
            document.getElementById('days').innerText = Math.floor(Math.random() * 300) + 50;
            document.getElementById('hours').innerText = now.getHours();
            document.getElementById('mins').innerText = now.getMinutes();
            document.getElementById('secs').innerText = now.getSeconds();
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Parallax effect on hero image scroll
        window.addEventListener('scroll', () => {
            const scrolled = window.pageYOffset;
            const heroImg = document.querySelector('img');
            if(heroImg) {
                heroImg.style.transform = `translateY(${scrolled * 0.15}px) scale(${1 + scrolled * 0.0002})`;
            }
        });
    </script>
