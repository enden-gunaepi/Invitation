<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        
        /* Glassmorphism Effect */
        .glass-card {
            background: rgba(247, 243, 237, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(182, 141, 64, 0.2);
        }

        /* Input styling */
        .minimal-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #d2c5b3;
            padding: 12px 0;
            width: 100%;
            transition: border-color 0.3s ease;
        }
        .minimal-input:focus {
            outline: none;
            border-bottom-color: #b68d40;
            box-shadow: none;
        }

        /* Apple-style Toggle */
        .presence-toggle input:checked + label {
            background-color: #7b580d;
            color: white;
        }

        .luxury-button {
            background: #b68d40;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .luxury-button:active {
            transform: scale(0.96);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface antialiased font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/70 dark:bg-surface-dim/70 backdrop-blur-xl shadow-[0px_8px_24px_rgba(47,47,47,0.08)] flex justify-between items-center px-margin-page h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-2xl">menu</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary italic">E &amp; J</h1>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary text-2xl">favorite</span>
</div>
</header>
<main class="pt-24 pb-32 px-margin-page max-w-[375px] mx-auto">
<!-- RSVP Header Section -->
<section class="text-center mb-stack-xl">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-stack-sm">Konfirmasi Kehadiran</h2>
<p class="font-body-md text-secondary max-w-[280px] mx-auto">Suatu kehormatan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir di hari bahagia kami.</p>
</section>
<!-- Progress Indicator -->
<div class="mb-stack-lg text-center">
<div class="inline-flex items-center gap-2 bg-surface-container-low px-4 py-2 rounded-full border border-outline-variant/30">
<div class="flex -space-x-2">
<div class="w-6 h-6 rounded-full border-2 border-white bg-tertiary-fixed-dim"></div>
<div class="w-6 h-6 rounded-full border-2 border-white bg-primary-fixed-dim"></div>
<div class="w-6 h-6 rounded-full border-2 border-white bg-secondary-fixed-dim"></div>
</div>
<span class="font-label-sm text-label-sm text-on-secondary-fixed-variant">
                    150 tamu telah mengonfirmasi kehadiran
                </span>
</div>
</div>
<!-- RSVP Form Card -->
<section class="glass-card rounded-[24px] p-margin-page shadow-[0px_8px_24px_rgba(47,47,47,0.08)]">
<form class="space-y-stack-lg" id="rsvpForm">
<!-- Nama Lengkap -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Nama Lengkap</label>
<input class="minimal-input font-body-md text-on-surface placeholder:text-outline-variant" placeholder="Masukkan nama Anda" type="text"/>
</div>
<!-- Jumlah Tamu -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Jumlah Tamu</label>
<div class="relative">
<select class="minimal-input font-body-md text-on-surface appearance-none bg-transparent">
<option value="1">1 Orang</option>
<option value="2">2 Orang</option>
<option value="3">3 Orang</option>
<option value="4">4 Orang</option>
</select>
<span class="material-symbols-outlined absolute right-0 bottom-3 text-secondary pointer-events-none">expand_more</span>
</div>
</div>
<!-- Nomor WhatsApp -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Nomor WhatsApp</label>
<input class="minimal-input font-body-md text-on-surface placeholder:text-outline-variant" placeholder="0812..." type="tel"/>
</div>
<!-- Status Kehadiran -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Status Kehadiran</label>
<div class="grid grid-cols-2 gap-stack-sm presence-toggle">
<div class="relative">
<input checked="" class="sr-only" id="hadir" name="status" type="radio" value="hadir"/>
<label class="flex items-center justify-center h-12 rounded-xl border border-outline-variant text-label-md font-label-md cursor-pointer transition-all duration-300" for="hadir">
                                Hadir
                            </label>
</div>
<div class="relative">
<input class="sr-only" id="tidak-hadir" name="status" type="radio" value="tidak-hadir"/>
<label class="flex items-center justify-center h-12 rounded-xl border border-outline-variant text-label-md font-label-md cursor-pointer transition-all duration-300" for="tidak-hadir">
                                Tidak Hadir
                            </label>
</div>
</div>
</div>
<!-- Ucapan & Doa -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-secondary block">Ucapan &amp; Doa</label>
<textarea class="w-full bg-secondary-fixed/30 rounded-2xl p-4 border border-outline-variant/30 focus:outline-none focus:border-primary min-h-[120px] font-body-md text-on-surface placeholder:text-outline-variant transition-colors" placeholder="Tuliskan ucapan selamat Anda..."></textarea>
</div>
<!-- Submit Button -->
<button class="luxury-button w-full h-[56px] rounded-full text-on-primary font-label-md text-label-md flex items-center justify-center gap-2 mt-4" type="submit">
                    Kirim RSVP
                    <span class="material-symbols-outlined text-lg">send</span>
</button>
</form>
</section>
<!-- Aesthetic Note -->
<footer class="mt-stack-xl text-center">
<p class="font-label-sm text-label-sm text-outline italic">Terima kasih atas doa restu Anda</p>
<div class="mt-stack-md flex justify-center gap-1">
<span class="w-1 h-1 bg-primary rounded-full"></span>
<span class="w-1 h-1 bg-primary/40 rounded-full"></span>
<span class="w-1 h-1 bg-primary/20 rounded-full"></span>
</div>
</footer>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-8 left-0 w-full z-50 flex justify-center px-4">
<div class="bg-secondary/70 backdrop-blur-xl border border-primary/20 shadow-[0px_8px_24px_rgba(47,47,47,0.08)] rounded-full px-6 py-3 w-[90%] max-w-md flex justify-between items-center">
<div class="flex flex-col items-center justify-center text-secondary">
<span class="material-symbols-outlined">home</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary">
<span class="material-symbols-outlined">favorite</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary">
<span class="material-symbols-outlined">photo_library</span>
</div>
<div class="relative flex flex-col items-center justify-center text-primary after:content-[''] after:w-1 after:h-1 after:bg-primary after:rounded-full after:absolute after:-bottom-1">
<span class="material-symbols-outlined">event_available</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary">
<span class="material-symbols-outlined">featured_seasonal_and_gifts</span>
</div>
</div>
</nav>
<script>
        // Simple micro-interaction for the form
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Mengirim...';
            
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-green-600');
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Terkirim';
                
                setTimeout(() => {
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-primary');
                    btn.innerHTML = originalContent;
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
