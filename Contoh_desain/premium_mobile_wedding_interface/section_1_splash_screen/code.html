<style>
        .glass-overlay {
            background: rgba(247, 243, 237, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        .fade-in-scale {
            animation: fadeInScale 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .stagger-up {
            opacity: 0;
            transform: translateY(20px);
            animation: staggerUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes staggerUp {
            100% { opacity: 1; transform: translateY(0); }
        }

        .btn-glow {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 0 8px 24px rgba(47, 47, 47, 0.08);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative w-full h-[100svh] overflow-hidden flex flex-col items-center justify-between py-margin-page px-margin-page text-center" id="splash-screen">
<!-- Background Image -->
<div class="absolute inset-0 z-0 fade-in-scale">
<div class="w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-tWGg8P9saL1rDSgxv_6jLkmjS6CYf8R6t3OAPrFduzUoWDJ0k7Takcti1obnnzJZgZckAnfHJbEITxeFDQ3m1_x_KILcgPo1mjCosoR1-6GQ8NIZfYz8yIsE4hS6lqlyhSWNuxsLd_9p0F_4u_siTM46ghD47dYEQGc8uJJ1M0fBnd2j2p81zl_46n1knkXrrdHw3831hqRXaHhXGXrhZZ78IZqfgqECFb4mdOpGe0Vq0qORT9zXvTX4px3-o_F_mMsvGClOhaA1');"></div>
<!-- Subtle Dark Gradient for Text Legibility -->
<div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black/60"></div>
</div>
<!-- Top Branding -->
<div class="relative z-10 stagger-up" style="animation-delay: 0.2s;">
<p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-white/90 mb-2">The Wedding of</p>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile italic text-white drop-shadow-md">Jonathan &amp; Amelia</h1>
</div>
<!-- Content & Action -->
<div class="relative z-10 w-full max-w-sm flex flex-col items-center gap-stack-lg stagger-up" style="animation-delay: 0.5s;">
<!-- Glassmorphism Card for Quote -->
<div class="glass-overlay rounded-[24px] p-6 border border-white/20 w-full">
<p class="font-headline-md text-headline-md italic text-white mb-2">"Cinta adalah janji yang abadi."</p>
<div class="w-12 h-[1px] bg-white/40 mx-auto my-4"></div>
<p class="font-label-md text-label-md text-white/90 tracking-widest uppercase">20 Desember 2026</p>
</div>
<!-- Primary Luxury Action -->
<button class="group relative w-full bg-primary-container text-on-primary text-[18px] font-semibold py-5 rounded-[24px] btn-glow transition-all duration-300 active:scale-95 hover:opacity-90 flex items-center justify-center gap-3">
<span class="font-label-md text-label-md tracking-widest uppercase">Buka Undangan</span>
<span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1">mail</span>
</button>
</div>
<!-- Scroll Indicator / Hint -->
<div class="relative z-10 stagger-up" style="animation-delay: 0.8s;">
<div class="flex flex-col items-center gap-2 text-white/70">
<span class="material-symbols-outlined animate-bounce">expand_more</span>
</div>
</div>
</main>
<!-- Hidden Navigation Shell (Predicted but suppressed for Transactional Splash) -->
<!-- The TopAppBar and BottomNavBar are present in JSON but according to the "Destination" rule, they are suppressed on linear splash screens -->
<script>
        // Simple Interaction: Button Ripple and Page Transition simulation
        document.querySelector('button').addEventListener('click', function() {
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
                // Logic to transition to main content would go here
                alert('Membuka undangan digital Jonathan & Amelia...');
            }, 150);
        });

        // Atmospheric parallax effect on mouse/tilt
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.005;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.005;
            document.querySelector('.fade-in-scale div').style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body></html>
